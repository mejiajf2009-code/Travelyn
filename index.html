<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PANDA | Specialty Coffee & Bakery</title>
    <style>
        :root { --negro: #1a1a1a; --dorado: #c5a059; --crema: #fdfcf9; }
        body { font-family: 'Georgia', serif; background-color: var(--crema); color: var(--negro); margin: 0; line-height: 1.6; }
        
        /* Portada Exclusiva */
        .portada { background: var(--negro); color: white; padding: 4rem 1rem; text-align: center; }
        .portada h1 { font-size: 3rem; margin: 0; letter-spacing: 2px; }
        .portada p { color: var(--dorado); text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; }

        section { padding: 2rem 1rem; max-width: 800px; margin: auto; }
        h2 { border-bottom: 2px solid var(--dorado); display: inline-block; padding-bottom: 5px; }

        /* Grid de Países */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 1rem; }
        button { background: white; border: 1px solid var(--dorado); padding: 10px; cursor: pointer; transition: 0.3s; font-family: serif; }
        button:hover { background: var(--dorado); color: white; }

        /* Catálogo */
        .producto { background: white; padding: 1.5rem; margin-bottom: 1rem; border-left: 5px solid var(--dorado); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-pedido { background: var(--negro); color: white; border: none; padding: 10px 20px; width: 100%; cursor: pointer; margin-top: 10px; }
        
        /* Pedido */
        .resumen { background: #eee; padding: 20px; margin-top: 2rem; }
    </style>
</head>
<body>

    <header class="portada">
        <h1>PANDA</h1>
        <p>Specialty Coffee & Bakery</p>
        <p>Conectando el mundo a través del sabor</p>
    </header>

    <section>
        <h2>Catálogo Internacional</h2>
        <p>Selecciona tu origen preferido:</p>
        <div class="grid" id="selector-paises"></div>
    </section>

    <section id="menu-panes">
        <h2>Selección de Panadería y Helados</h2>
        <div id="lista-productos"></div>
    </section>

    <section class="resumen">
        <h3>Tu Selección</h3>
        <ul id="lista-pedido"></ul>
        <button class="btn-pedido" onclick="enviarWhatsApp()">Enviar pedido por WhatsApp</button>
    </section>

    <script>
        const catálogo = {
            "Francia": ["Baguette", "Croissant", "Pain au Chocolat"],
            "Alemania": ["Pumpernickel", "Brezel", "Roggenbrot"],
            "Italia": ["Ciabatta", "Focaccia", "Panettone"],
            "España": ["Barra de pan", "Ensaimada", "Pan de Alfacar"],
            "Reino Unido": ["Scones", "English Muffins", "Crumpets"],
            "Dinamarca": ["Wienerbrød"],
            "Grecia": ["Pan Pita", "Spanakopita"],
            "Colombia": ["Pan de bono", "Pan de yuca", "Almojábana"],
            "México": ["Conchas", "Bolillos", "Orejas"],
            "EE.UU.": ["Bagels", "Sourdough", "Cornbread"],
            "Chile": ["Marraqueta", "Hallulla"],
            "Argentina": ["Medialunas", "Bizcochos de grasa"],
            "Brasil": ["Pão de Queijo"],
            "Japón": ["Shokupan", "Melonpan", "Kare Pan"],
            "Corea del Sur": ["Korean Cream Cheese Garlic Bread"],
            "Líbano": ["Khubz", "Manousheh"],
            "Heladería": ["Gelato de Matcha", "Raspado de Frutos Rojos", "Helado de Vainilla y Sésamo Negro"]
        };

        let pedido = [];

        // Generar botones de países
        const container = document.getElementById('selector-paises');
        Object.keys(catálogo).forEach(pais => {
            let btn = document.createElement('button');
            btn.innerText = pais;
            btn.onclick = () => mostrarProductos(pais);
            container.appendChild(btn);
        });

        function mostrarProductos(pais) {
            const list = document.getElementById('lista-productos');
            list.innerHTML = `<h3>Productos de ${pais}</h3>`;
            catálogo[pais].forEach(item => {
                let div = document.createElement('div');
                div.className = 'producto';
                div.innerHTML = `
                    <strong>${item}</strong><br>
                    <input type="number" id="qty-${item.replace(/\s/g, '')}" value="1" min="1" max="10" style="width:50px;">
                    <button class="btn-pedido" onclick="agregar('${item}', 'qty-${item.replace(/\s/g, '')}')">Añadir al pedido</button>
                `;
                list.appendChild(div);
            });
        }

        function agregar(item, qtyId) {
            let cantidad = document.getElementById(qtyId).value;
            pedido.push(`${cantidad}x ${item}`);
            actualizarLista();
        }

        function actualizarLista() {
            const ul = document.getElementById('lista-pedido');
            ul.innerHTML = pedido.map(p => `<li>${p}</li>`).join('');
        }

        function enviarWhatsApp() {
            let msg = "Hola, quiero realizar un pedido en PANDA: " + pedido.join(", ");
            window.open("https://wa.me/34639077423?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
