<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANDA | Specialty Coffee & Bakery</title>
    <style>
        :root { --negro: #1A1A1A; --dorado: #C5A059; --crema: #F9F7F2; }
        body { font-family: 'Playfair Display', serif; background-color: var(--crema); margin: 0; color: var(--negro); }

        /* Portada */
        .hero { position: relative; height: 60vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay { position: absolute; background: rgba(0,0,0,0.5); width: 100%; height: 100%; }
        .hero-text { position: absolute; color: white; text-align: center; }
        .hero-text h1 { font-size: 4rem; margin: 0; letter-spacing: 5px; }

        /* Mapa Interactivo */
        .map-section { padding: 4rem 10%; text-align: center; }
        .map-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-top: 2rem; }
        .btn-country { background: white; border: 1px solid var(--dorado); padding: 15px; cursor: pointer; transition: 0.4s; font-weight: 600; }
        .btn-country:hover { background: var(--dorado); color: white; }

        /* Catálogo */
        .catalog { padding: 4rem 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .product-card { background: white; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .qty-control { display: flex; gap: 10px; margin: 15px 0; align-items: center; justify-content: center; }
        button.add-btn { background: var(--negro); color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; }

        /* Footer Pedido */
        .order-bar { position: sticky; bottom: 0; background: var(--negro); color: white; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <header class="hero">
        <img src="1000309919.jpg" alt="Portada Panda">
        <div class="hero-overlay"></div>
        <div class="hero-text">
            <h1>PANDA</h1>
            <p>Conectando el mundo a través del sabor</p>
        </div>
    </header>

    <section class="map-section">
        <h2>El Viaje del Panda</h2>
        <p>Selecciona un país y el Maestro Panda te explicará su especialidad.</p>
        <div class="map-grid" id="mapa"></div>
        <div id="curador-box" style="margin-top:2rem; padding:2rem; border-top: 1px solid var(--dorado);">
            <h3>Seleccione una región en el mapa.</h3>
        </div>
    </section>

    <div class="catalog" id="catalogo">
        <!-- Productos se cargan aquí -->
    </div>

    <div class="order-bar">
        <h3>Tu selección</h3>
        <ul id="lista-pedido" style="list-style:none; padding:0;"></ul>
        <button class="add-btn" style="background:var(--dorado);" onclick="enviarPedido()">Enviar Pedido por WhatsApp</button>
    </div>

    <script>
        const store = {
            "Colombia": { info: "El Panda recomienda: El Pandebono, símbolo de hospitalidad.", prods: ["Pandebono", "Almojábana"] },
            "Francia": { info: "El Panda recomienda: Técnica pura en el Croissant.", prods: ["Croissant", "Pain au Chocolat"] },
            "Japón": { info: "El Panda recomienda: Shokupan (textura de nube).", prods: ["Shokupan", "Melonpan"] }
        };

        // Renderizar mapa
        const mapa = document.getElementById('mapa');
        Object.keys(store).forEach(pais => {
            let btn = document.createElement('button');
            btn.className = 'btn-country';
            btn.innerText = pais;
            btn.onclick = () => {
                document.getElementById('curador-box').innerHTML = `<h3>${pais}</h3><p>${store[pais].info}</p>`;
                renderProductos(store[pais].prods);
            };
            mapa.appendChild(btn);
        });

        function renderProductos(prods) {
            const cat = document.getElementById('catalogo');
            cat.innerHTML = prods.map(p => `
                <div class="product-card">
                    <div style="background:#ddd; height:200px; display:flex; align-items:center; justify-content:center;">Foto de ${p}</div>
                    <h3>${p}</h3>
                    <div class="qty-control">
                        <button onclick="changeQty('${p}', -1)">-</button>
                        <span id="qty-${p}">1</span>
                        <button onclick="changeQty('${p}', 1)">+</button>
                    </div>
                    <button class="add-btn" onclick="agregar('${p}')">Añadir al pedido</button>
                </div>
            `).join('');
        }

        let pedido = [];
        function agregar(item) {
            let qty = document.getElementById('qty-'+item).innerText;
            pedido.push(`${qty}x ${item}`);
            document.getElementById('lista-pedido').innerHTML = pedido.map(p => `<li>${p}</li>`).join('');
        }

        function changeQty(item, val) {
            let el = document.getElementById('qty-'+item);
            let n = parseInt(el.innerText) + val;
            if(n >= 1) el.innerText = n;
        }

        function enviarPedido() {
            window.open("https://wa.me/34639077423?text=Hola, quiero pedir: " + pedido.join(", "));
        }
    </script>
</body>
</html>
