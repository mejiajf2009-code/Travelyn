    <title>PANDA | Panadería Ancestral & Specialty Coffee</title>

    <style>
        :root {
            --bg-pure: #ffffff;
            --bg-surface: #faf7f2; 
            --bg-dark: #111113; /* El elegante negro mate de tu tienda */
            --gold: #b38f44; 
            --gold-light: #f3edd2;
            --text-main: #1c1c1f; 
            --text-muted: #5c626a;
            --radius-premium: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-pure);
            color: var(--text-main);
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .logo-title {
            font-family: 'Playfair Display', serif;
        }

        /* Navbar Principal con tu Logo 1000309039.png */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
        }

        .brand-logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .brand-logo-file {
            height: 75px; 
            width: auto;
            object-fit: contain;
        }

        .logo-title {
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--bg-dark);
            letter-spacing: 2px;
            line-height: 1;
        }

        .logo-subtitle {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.65rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-top: 4px;
            display: block;
        }

        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 2rem;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--gold); }

        /* Portada de Bienvenida Oficial */
        .hero-welcome {
            background: linear-gradient(rgba(17, 17, 19, 0.4), rgba(17, 17, 19, 0.85)), url('https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            padding: 9rem 5%;
            text-align: center;
            border-bottom: 4px solid var(--gold);
        }

        .hero-content {
            max-width: 850px;
            margin: 0 auto;
        }

        .hero-content h1 {
            font-size: 3.6rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .hero-content h1 span {
            color: #dfc48c;
            font-style: italic;
        }

        .hero-content p {
            font-size: 1.15rem;
            color: #f3eedf;
            line-height: 1.8;
            font-weight: 300;
        }

        /* Sección Mapa Internacional Interactivo del Panda 🗾 */
        .interactive-map-section {
            background-color: var(--bg-dark);
            color: #ffffff;
            padding: 5rem 5%;
            text-align: center;
        }

        .map-header {
            margin-bottom: 3rem;
        }

        .map-header h2 {
            font-size: 2.6rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .map-header p {
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        /* Grid de Países (Ruta del Mapa) */
        .map-countries-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1.2rem;
            max-width: 1200px;
            margin: 0 auto 3rem auto;
        }

        .country-tab-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(179, 143, 68, 0.3);
            border-radius: 50px;
            padding: 1rem 2rem;
            color: #ffffff;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .country-tab-btn:hover, .country-tab-btn.active-country {
            background: var(--gold);
            border-color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(179, 143, 68, 0.2);
        }

        /* Pizarra del Panda Explicando el Significado */
        .panda-speech-board {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            color: var(--text-main);
            border-radius: var(--radius-premium);
            padding: 3rem;
            border-left: 8px solid var(--gold);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .panda-animation-placeholder {
            font-size: 4.5rem;
            line-height: 1;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .speech-content h4 {
            font-size: 1.6rem;
            color: var(--gold);
            margin-bottom: 0.6rem;
            font-weight: 700;
        }

        .speech-content p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #2c313a;
        }

        /* Vitrina de Productos Reales */
        .showcase-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 5rem 5%;
        }

        .showcase-title {
            text-align: center;
            margin-bottom: 4rem;
        }

        .showcase-title h2 { font-size: 2.7rem; margin-bottom: 0.5rem; }
        .showcase-title p { color: var(--text-muted); font-size: 1rem; }

        .bakery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 3rem;
        }

        .bakery-item-card {
            background: #ffffff;
            border-radius: var(--radius-premium);
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.02);
            border: 1px solid rgba(179, 143, 68, 0.12);
            display: flex;
            flex-direction: column;
            transition: all 0.4s ease;
        }

        .bakery-item-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(179, 143, 68, 0.12);
            border-color: var(--gold);
        }

        .item-image-holder {
            position: relative;
            height: 260px;
            background-color: #f5eedf;
        }

        .item-image-holder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-country-tag {
            position: absolute;
            top: 1.2rem;
            left: 1.2rem;
            background: var(--bg-dark);
            color: #ffffff;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
